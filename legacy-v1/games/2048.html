<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Game</title>
  <style>

    :root {
      --bg-color: #fdfdfd;
      --tile-color: #eee4da;
      --text-color: #222;
    }

    body.dark {
      --bg-color: #121212;
      --tile-color: #3a3a3a;
      --text-color: #f0f0f0;
      background: var(--bg-color);
      color: var(--text-color);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    /* MENU PAGE */
    .menu {
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 2rem;
    }
    .menu button {
      display: block;
      width: 250px;
      padding: 1rem;
      margin: 1rem auto;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      background: #ffffff22;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .menu button:hover {
      background: #ffffff44;
    }

    /* FORM PAGE */
    .form-container {
      display: none;
      text-align: center;
      background: #222222cc;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .form-container input, .form-container select {
      display: block;
      margin: 1rem auto;
      padding: 12px;
      width: 80%;
      border: none;
      border-radius: 8px;
    }
    .form-container button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background-color: #03a9f4;
      color: #fff;
      cursor: pointer;
    }

    /* GAME OVER SCREEN */
    #gameOverModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: #222;
      color: #fff;
      padding: 20px 30px;
      border-radius: 12px;
      text-align: center;
      z-index: 1000;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      animation: popup-fade 0.4s ease forwards;
    }

    @keyframes popup-fade {
      from {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    #leaderboardModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      color: #fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      z-index: 1000;
    }

    #leaderboardModal ul {
      list-style: none;
      padding: 0;
    }
    #leaderboardModal li {
      margin: 8px 0;
    }
    #gameOverModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(20, 20, 20, 0.95);
      color: #fff;
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 10px;
      animation: fadeInScale 0.5s ease-out forwards;
      opacity: 0;
      transform: scale(0.8);
    }

    #gameOverModal.show {
      display: flex;
    }

    @keyframes fadeInScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #gameOverModal h2 {
      font-size: 3rem;
      color: #ff4081;
      margin-bottom: 1rem;
      animation: popText 0.5s ease;
    }

    #gameOverStats p {
      margin: 0.5rem 0;
      font-size: 1.3rem;
      color: #ffeb3b;
    }
    #gameOverStats strong {
      color: #03a9f4;
      font-weight: bold;
    }

    #gameOverModal button {
      margin-top: 2rem;
      padding: 14px 30px;
      font-size: 1.2rem;
      background: #03a9f4;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: transform 0.3s;
    }
    #gameOverModal button:hover {
      transform: scale(1.1);
    }

    @keyframes popText {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }   
    .game-container {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .scoreboard {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      margin-bottom: 1rem;
    }
    .scorebar div {
      background: #333;
      padding: 1rem 2rem;
      border-radius: 8px;
      text-align: center;
    }
    .timer {
      font-size: 1.2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 10px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
    }
    .tile {
      width: 80px;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #444;
      font-weight: bold;
      font-size: 1.5rem;
      color: white;
      border-radius: 6px;
      transition: transform 0.2s;
    }
    .tile[data-value="2"] { background-color: #eee4da; color: #776e65; }
    .tile[data-value="4"] { background-color: #5979b9; color: #ffffff; }
    .tile[data-value="8"] { background-color: #e99347; color: #f9f6f2; }
    .tile[data-value="16"] { background-color: #54f059; color: #f9f6f2; }
    .tile[data-value="32"] { background-color: #f93908; color: #f9f6f2; }
    .tile[data-value="64"] { background-color: #ee1a6f; color: #f9f6f2; }
    .tile[data-value="128"] { background-color: #f3b809; color: #f9f6f2; }
    .tile[data-value="256"] { background-color: #3106f4; color: #f9f6f2; }
    .tile[data-value="512"] { background-color: #03c5f6; color: #f9f6f2; }
    .tile[data-value="1024"] { background-color: #008248; color: #f9f6f2; }
    .tile[data-value="2048"] { background-color: #781bd5; color: #f9f6f2; }
    .tile.empty {
      background-color: #333;
    }
    .controls {
      margin-top: 1rem;
    }
    .controls button {
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      border-radius: 8px;
      background-color: #03a9f4;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .controls button:hover {
      background-color: #0288d1;
    }
    .timer {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    .tile[data-value="4096"] { background-color: #3c3a32; color: #fff; }
    .tile[data-value="8192"] { background-color: #1f1f1f; color: #fff; }
    .tile[data-value="16384"] { background-color: #000; color: #ff0; }

    .tile.merge {
      animation: pop 0.2s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @media (max-width: 600px) {
      .grid {
        /* grid-template-columns: repeat(2, 1fr); */
        transform: scale(0.8);
      }
      .tile {
        width: 100%;
        height: 100px;
      }
      .scoreboard {
        flex-direction: column;
        align-items: center;
      }
    }

    #gameOverStats p {
      margin: 0.5rem 0;
      font-size: 1.1rem;
      color: #ffeb3b;
    }
    #gameOverStats strong {
      color: #03a9f4;
    }

    @keyframes winnerFlash {
      0% { background-color: transparent; }
      50% { background-color: rgba(255, 255, 0, 0.1); }
      100% { background-color: transparent; }
    }

    .winner-highlight {
      animation: winnerFlash 0.6s ease-in-out 3;
    }

    .menu-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 2rem;
      cursor: pointer;
      z-index: 10000;
      color: white;
    }

    .Menu {
      display: none;
      position: fixed;
      top: 60px;
      left: 20px;
      background: var(--bg-color);
      border: 2px solid var(--tile-color);
      padding: 12px;
      border-radius: 8px;
      z-index: 9999;
      font-size: 1rem;
      color: var(--text-color);
    }
    .Menu.show {
      display: block;
    }
    .Menu label,
    .Menu button {
      display: block;
      margin: 8px 0;
    }

    #fireworksCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999999;
    }

    #trophyAnimation {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      font-size: 6rem;
      opacity: 0;
      animation: none;
      z-index: 99999;
      pointer-events: none;
    }

    @keyframes trophyPop {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }
      40% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="Menu" id="hamburgerMenu">
    <label><input type="checkbox" id="darkToggle" onchange="toggleDarkMode()"> 🌒 Dark Mode</label>
    <button onclick="localStorage.clear(); location.reload();">🔁 Reset Progress</button>
    <label><input type="checkbox" id="soundToggle" onchange="toggleSound()"> 🔇 Sound Off</label>
  </div>
    <!-- MENU SCREEN -->
  <div class="menu" id="menu">
    <div class="logo">WeR</div>
    <button onclick="goToForm()">Start Game</button>
    <button disabled>Best Scores (Coming Soon)</button>
    <button onclick="window.location.href = 'challenge-mode.html'">Challenge Mode</button>
    <button onclick="startAIMode()">Multiplayer Mode</button>
  </div>

  <!-- FORM SCREEN -->
  <div class="form-container" id="formContainer">
    <h2>Enter Player Name</h2>
    <input type="text" id="playerName" placeholder="Your Name">
    <select id="modeSelector">
      <option value="easy">Easy (No Timer)</option>
      <option value="medium">Medium (150 sec)</option>
      <option value="hard" selected>Hard (60 sec)</option>
    </select>
    <button onclick="startGame()">Start</button>
  </div>
  <div class="game-container" id="gameContainer">
    <div class="scoreboard">
      <div>
        <img id="playerIconDisplay" src="https://img.icons8.com/ios-filled/50/user.png" alt="Player Icon" style="width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px;">
        <h3 id="playerNameDisplay"></h3>
      </div>
      <div>
        <h3>Score</h3>
        <p id="score">0</p>
      </div>
      <div>
        <h3>Moves</h3>
        <p id="moves">0</p>
      </div>
      <div>
        <h3>AI Score</h3>
        <p><span id="aiScoreDisplay">0</span></p>
      </div>
      <div>
        <h3>Best</h3>
        <p id="bestScore">0</p>
      </div>
    </div>
    <div class="timer" id="timer">Time Left: 60s</div>
    <div id="challengeInfo" style="display:none; text-align: center; margin-bottom: 1rem;">
      <div style="font-size: 1.2rem;">
        <strong>Moves Left:</strong> <span id="challengeMoves"></span>
      </div>
      <div style="margin-top: 0.5rem;">
        <strong>Objectives:</strong> <span id="challengeObjectives"></span>
      </div>
    </div>
    <div class="grid" id="grid">
      <!-- Tiles will be dynamically generated -->
    </div>
    <div class="controls">
      <button onclick="restartGame()">Restart</button>
      <button onclick="togglePause()">Pause</button>
    </div>
  </div>
  <audio id="moveSound" src="./sounds/flip.mp3"></audio>
  <audio id="mergeSound" src="./sounds/match.mp3"></audio>

  <!-- Add this modal at the end of the body -->
  <div id="gameOverModal">
    <h2>Game Over!</h2>
    <div id="gameOverStats"></div>
    <div style="margin-top: 2rem;">
      <button onclick="restartGame()">🔁 Rematch</button>
    </div>
  </div>

  <div id="leaderboardModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; color: #fff; padding: 20px; border-radius: 8px; text-align: center; z-index: 1000;">
    <h2>Leaderboard</h2>
    <ul id="leaderboard"></ul>
    <button onclick="closeLeaderboard()">Close</button>
  </div>
  <canvas id="fireworksCanvas"></canvas>
  <div id="trophyAnimation">🏆</div>

  <script>
    let gridSize = 4;
    let grid = [];
    let score = 0;
    let bestScore = localStorage.getItem('bestScore') || 0;
    let timerInterval;
    let timeLeft = null;
    let mode = 'hard'; // default
    let gameWonShown = false;
    let moves = 0;
    let gameEnded = false;
    let aiGrid = [];
    let aiScore = 0;
    let aiTimer = null;
    let isAIMode = false;


    let challengeMode = false;
    let challengeObjectives = [];
    let challengeMovesLeft = 0;
    let challengeProgress = {};
    

    // const challengeData = JSON.parse(localStorage.getItem('challengeData'));

    let challengeData = null;
    try {
      challengeData = JSON.parse(localStorage.getItem('challengeData'));
    } catch (e) {
      challengeData = null;
    }

    if (challengeData && challengeData.objectives) {
      challengeMode = true;
      challengeObjectives = Array.isArray(challengeData.objectives) ? challengeData.objectives : [challengeData.objectives];
      challengeMovesLeft = 50;
      challengeObjectives.flat().forEach(obj => {
        challengeProgress[obj.tile] = 0;
      });

      // 🔥 Auto-start ONLY IF challenge is set
      window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        restartGame();

        // ✅ Clear it AFTER starting once
        localStorage.removeItem('challengeData');
      });
    }

    document.getElementById('bestScore').textContent = bestScore;

    function goToForm() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('formContainer').style.display = 'block';
    }


    function startGame() {
      const playerName = document.getElementById('playerName').value.trim();
      mode = document.getElementById('modeSelector').value;

      if (!playerName) {
        alert('Please enter your name to start the game.');
        return;
      }

      if (challengeMode && challengeData?.level) {
        document.getElementById('playerNameDisplay').textContent = `Challenge: ${challengeData.mode.toUpperCase()} #${challengeData.level}`;
      } else {
        document.getElementById('playerNameDisplay').textContent = playerName;
      }

      document.getElementById('formContainer').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'flex';

      restartGame();

      if (timeLeft !== null) {
        startTimer();
      }
    }

    function retryGame() {
      document.getElementById('gameOverScreen').style.display = 'none';
      // document.getElementById('menu').style.display = 'block';
    }

    function startTimer() {
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = `Time Left: ${timeLeft}s`;

      timerInterval = setInterval(() => {
        if (timeLeft !== null) {
          timeLeft--;
          document.getElementById('timer').textContent = `Time Left: ${timeLeft}s`;

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            showGameOver(); // ✅ Use the new function that shows score, time, moves
          }
        } else {
          document.getElementById('timer').textContent = 'Relax Mode';
        }
      }, 1000);
    }

    function endGame() {
      const endTime = new Date();
      const duration = Math.floor((endTime - gameStartedAt) / 1000);
      document.getElementById('finalStats').innerHTML = `Score: ${score}<br>Moves: ${moves}<br>Time: ${duration}s`;
      document.getElementById('gameOverScreen').style.display = 'block';
    }

    function createGrid() {
      const gridElement = document.getElementById('grid');
      gridElement.innerHTML = '';
      grid = [];

      for (let i = 0; i < gridSize; i++) {
        const row = [];
        for (let j = 0; j < gridSize; j++) {
          const tile = document.createElement('div');
          tile.classList.add('tile', 'empty');
          tile.dataset.row = i;
          tile.dataset.col = j;
          gridElement.appendChild(tile);
          row.push(0);
        }
        grid.push(row);
      }

      // Pre-fill the grid with some random values
      for (let i = 0; i < 2; i++) {
        spawnTile();
      }
    }

    function spawnTile() {
      const emptyTiles = [];
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          if (grid[i][j] === 0) {
            emptyTiles.push({ row: i, col: j });
          }
        }
      }

      if (emptyTiles.length === 0) return;

      const { row, col } = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
      grid[row][col] = Math.random() < 0.9 ? 2 : 4;
      updateGrid();
    }

    function updateGrid() {
      const gridElement = document.getElementById('grid');
      const tiles = gridElement.children;

      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          const tile = tiles[i * gridSize + j];
          const value = grid[i][j];
          tile.textContent = value === 0 ? '' : value;
          tile.className = 'tile';
          if (value !== 0) {
            tile.dataset.value = value;
            if (value === 2048 && !gameWonShown) {
              gameWonShown = true;
              showGameOver();
            }
          } else {
            tile.classList.add('empty');
          }
        }
      }
      if (challengeMode) updateChallengeObjectives();

      document.getElementById('score').textContent = score;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('bestScore', bestScore);
        document.getElementById('bestScore').textContent = bestScore;
      }
    }

    function move(direction) {
      if (isPaused || gameEnded) return;

      const moveSound = document.getElementById('moveSound');
      let moved = false;
      if (direction === 'up' || direction === 'down') {
        for (let col = 0; col < gridSize; col++) {
          const values = [];
          for (let row = 0; row < gridSize; row++) {
            if (grid[row][col] !== 0) {
              values.push(grid[row][col]);
            }
          }

          const merged = mergeTiles(values, direction === 'down');
          for (let row = 0; row < gridSize; row++) {
            if (grid[row][col] !== merged[row]) {
              moved = true;
            }
            grid[row][col] = merged[row];
          }
        }
      } else if (direction === 'left' || direction === 'right') {
        for (let row = 0; row < gridSize; row++) {
          const values = grid[row].filter(value => value !== 0);
          const merged = mergeTiles(values, direction === 'right');
          for (let col = 0; col < gridSize; col++) {
            if (grid[row][col] !== merged[col]) {
              moved = true;
            }
            grid[row][col] = merged[col];
          }
        }
      }

      if (moved) {
        moveSound.play();
        spawnTile();
        checkGameOver();
        moves++;
        if (challengeMode) {
          challengeMovesLeft--;
          document.getElementById('challengeMoves').textContent = challengeMovesLeft;

          let allDone = challengeObjectives.flat().every(obj => {
            return (challengeProgress[obj.tile] || 0) >= obj.count;
          });

          if (allDone) {
            showChallengeResult(true);
            return;
          }

          if (challengeMovesLeft <= 0) {
            showChallengeResult(false);
            return;
          }
        }
      }
    }

    function mergeTiles(values, reverse) {
      const mergeSound = document.getElementById('mergeSound')
      if (reverse) values.reverse();

      const merged = [];
      let skip = false;

      for (let i = 0; i < values.length; i++) {
        if (skip) {
          skip = false;
          continue;
        }

      if (i < values.length - 1 && values[i] === values[i + 1]) {
        const mergedValue = values[i] * 2;
        merged.push(mergedValue);
        score += mergedValue;
        mergeSound.play();
        skip = true;

        // ✅ Challenge count ONLY for merged tile
        if (challengeMode) {
          challengeObjectives.flat().forEach(obj => {
            if (mergedValue === obj.tile) {
              challengeProgress[obj.tile] = Math.min((challengeProgress[obj.tile] || 0) + 1, obj.count);
            }
          });
        }
      } else {
          merged.push(values[i]);
        }
      }

      while (merged.length < gridSize) {
        merged.push(0);
      }

      if (reverse) merged.reverse();
      return merged;
    }

    function checkGameOver() {
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          if (grid[i][j] === 0) return;
          if (i < gridSize - 1 && grid[i][j] === grid[i + 1][j]) return;
          if (j < gridSize - 1 && grid[i][j] === grid[i][j + 1]) return;
        }
      }
      showGameOver();
    }

    function restartGame() {
      score = 0;
      createGrid();
      spawnTile();
      spawnTile();

      if (challengeMode) {
        document.getElementById('challengeInfo').style.display = 'block';
        document.getElementById('challengeMoves').textContent = challengeMovesLeft;
        updateChallengeObjectives();
      } else {
        document.getElementById('challengeInfo').style.display = 'none';
      }
    
      if (isAIMode) {
        aiScore = 0;
        if (document.getElementById('aiScoreDisplay')) {
          document.getElementById('aiScoreDisplay').textContent = aiScore;
        }
      }
      // ✅ Reset timeLeft based on current mode
      if (mode === 'easy') {
        timeLeft = null;
        document.getElementById('timer').textContent = 'Relax Mode';
      } else if (mode === 'medium') {
        timeLeft = 150;
        document.getElementById('timer').style.display = 'block';
      } else {
        timeLeft = 60;
        document.getElementById('timer').style.display = 'block';
      }

      if (timeLeft !== null) {
        startTimer();
      } else {
        clearInterval(timerInterval);
        document.getElementById('timer').textContent = '';
      }

      updateGrid(); // ✅ also refresh grid visuals
      // Hide modals
      document.getElementById('gameOverModal').style.display = 'none';
      gameEnded = false;
    }
    let isPaused = false;

    function togglePause() {
      const pauseButton = document.querySelector('.controls button[onclick="togglePause()"]');
      if (isPaused) {
        startTimer();
        pauseButton.textContent = 'Pause';
      } else {
        clearInterval(timerInterval);
        pauseButton.textContent = 'Resume';
      }
      isPaused = !isPaused;
    }

    document.addEventListener('keydown', event => {
      switch (event.key) {
        case 'ArrowUp':
          move('up');
          break;
        case 'ArrowDown':
          move('down');
          break;
        case 'ArrowLeft':
          move('left');
          break;
        case 'ArrowRight':
          move('right');
          break;
      }
    });

    });

    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      touchEndY = e.changedTouches[0].screenY;
      handleSwipe();
    });

    function handleSwipe() {
      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        if (deltaX > 0) move('right');
        else move('left');
      } else {
        if (deltaY > 0) move('down');
        else move('up');
      }
    }

      localStorage.setItem('challengeData', JSON.stringify({
        level: nextLevel,
        mode,
        objectives: nextChallenge

      if (gameEnded) return;

      const directions = ['ArrowDown', 'ArrowRight', 'ArrowLeft', 'ArrowUp'];
      let bestMove = null;

      directions.forEach(dir => {
        const simulated = simulateMove(dir, aiGrid);
        if (simulated && simulated.score > maxScore) {
          maxScore = simulated.score;
          bestMove = dir;

      });

      if (bestMove) {
        const result = simulateMove(bestMove, aiGrid);
        aiGrid = result.newGrid;
        aiScore += result.score;
        spawnAITile(); // ✅ THIS IS THE RIGHT FUNCTION
      }

      if (isAIGridFull(aiGrid)) {
        showGameOver();
      }

      const emptyCells = [];
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {

            emptyCells.push({ x: i, y: j });

      if (emptyCells.length > 0) {
        const { x, y } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        aiGrid[x][y] = Math.random() < 0.9 ? 2 : 4;
      }
    }

        const [newGrid, moved, gained] = simulateMove(copy, dir);
        if (moved && gained > bestScore) {
          bestScore = gained;

    function simulateMove(direction, grid) {
      const newGrid = grid.map(row => row.slice()); // deep copy
      let moved = false;
      let score = 0;

      function mergeTiles(arr, reverse = false) {
        if (reverse) arr = arr.reverse();
        const merged = [];
        let skip = false;

        for (let i = 0; i < arr.length; i++) {
          if (skip) {
            skip = false;
            continue;
          }

          if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
            merged.push(arr[i] * 2);
            score += arr[i] * 2;
            skip = true;
          } else {
            merged.push(arr[i]);
          }
        }

        while (merged.length < gridSize) {
          merged.push(0);
        }

        return reverse ? merged.reverse() : merged;
      }

      if (direction === 'ArrowUp' || direction === 'ArrowDown') {
        for (let col = 0; col < gridSize; col++) {
          const values = [];
          for (let row = 0; row < gridSize; row++) {
            if (newGrid[row][col] !== 0) {
              values.push(newGrid[row][col]);
            }
          }

          const merged = mergeTiles(values, direction === 'ArrowDown');
          for (let row = 0; row < gridSize; row++) {
            if (newGrid[row][col] !== merged[row]) moved = true;
            newGrid[row][col] = merged[row];
          }
        }
      } else if (direction === 'ArrowLeft' || direction === 'ArrowRight') {
        for (let row = 0; row < gridSize; row++) {
          const values = newGrid[row].filter(v => v !== 0);
          const merged = mergeTiles(values, direction === 'ArrowRight');
          for (let col = 0; col < gridSize; col++) {
            if (newGrid[row][col] !== merged[col]) moved = true;
            newGrid[row][col] = merged[col];
          }
        }
      }

      if (moved) {
        return { newGrid, score };
      }
      return null;
    }


    function isAIGridFull(grid) {
      return !grid.some(row => row.includes(0));
    }



    function triggerFireworks() {
      const canvas = document.getElementById("fireworksCanvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];

      for (let i = 0; i < 80; i++) {
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          speedX: Math.random() * 6 - 3,
          speedY: Math.random() * 6 - 3,
          radius: Math.random() * 3 + 2,
          alpha: 1,
          color: `hsl(${Math.random() * 360}, 100%, 50%)`
        });
      }

      const interval = setInterval(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
          ctx.fill();
          p.x += p.speedX;
          p.y += p.speedY;
          p.alpha -= 0.02;
        });

        if (particles.every(p => p.alpha <= 0)) {
          clearInterval(interval);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }, 16);
    }
