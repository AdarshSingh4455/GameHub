<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Waffle Cone -->
  <polygon points="30,50 70,50 50,90" fill="#D7CCC8" stroke="#8D6E63" stroke-width="2" />
  <line x1="35" y1="55" x2="55" y2="80" stroke="#8D6E63" stroke-width="1.5" />
  <line x1="45" y1="50" x2="60" y2="70" stroke="#8D6E63" stroke-width="1.5" />
  <line x1="65" y1="55" x2="45" y2="80" stroke="#8D6E63" stroke-width="1.5" />
  <line x1="55" y1="50" x2="40" y2="70" stroke="#8D6E63" stroke-width="1.5" />
  <!-- Scoop 1 (Chocolate) -->
  <circle cx="50" cy="45" r="18" fill="#5D4037" />
  <!-- Scoop 2 (Strawberry) -->
  <circle cx="50" cy="30" r="15" fill="#F48FB1" />
  <!-- Cherry -->
  <circle cx="50" cy="14" r="5" fill="#D50000" />
</svg>
