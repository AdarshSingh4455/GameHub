<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Board Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(15, 40px);
      grid-template-rows: repeat(15, 40px);
      border: 4px solid #000;
      position: relative;
    }
    .cell {
      width: 40px;
      height: 40px;
      border: 1px solid #999;
    }

    .home-red, .home-green, .home-yellow, .home-blue {
      border: none;
    }
    .home-red { background-color: #a61616; }
    .home-green { background-color: #067d06; }
    .home-yellow { background-color: #9d9d25; }
    .home-blue { background-color: #0b57a3; }

    .token-base {
      background-color: white;
      border-radius: 50%;
      margin: 8px;
      border: none;
    }

    .path-red { background-color: #ffcccc; }
    .path-green { background-color: #ccffcc; }
    .path-yellow { background-color: #ffffcc; }
    .path-blue { background-color: #cce0ff; }

    .win-red, .win-green, .win-yellow, .win-blue {
      background-color: white;
    }

    .center {
      background: conic-gradient(
        red 0deg 90deg,
        yellow 90deg 180deg,
        green 180deg 270deg,
        blue 270deg 360deg
      );
      border-radius: 50%; /* circular */
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
    }


    .star {
      background-color: white;
      position: relative;
    }
    .star::after {
      content: '★';
      color: black;
      font-size: 18px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .token {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      box-shadow: 0 0 5px #0005;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      z-index: 10;
    }
    .red-token { background-color: red; }
    .green-token { background-color: green; }
    .yellow-token { background-color: goldenrod; }
    .blue-token { background-color: blue; }

    .dice {
      margin: 20px;
      padding: 10px 20px;
      background: #333;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
      user-select: none;
    }
    
  </style>
</head>
<body>
  <div class="dice" onclick="rollDice()">🎲 Roll Dice</div>
  <div id="diceResult">Dice: -</div>
  <div class="board" id="board"></div>

  <script>
    const board = document.getElementById('board');
    const diceResult = document.getElementById('diceResult');
    let diceValue = 0;
    let currentPlayer = 'red';
    const playerOrder = ['red', 'green', 'yellow', 'blue'];


    // Grid builder
    for (let row = 0; row < 15; row++) {
      for (let col = 0; col < 15; col++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');

        if (row < 6 && col < 6) cell.classList.add('home-red');
        if (row < 6 && col > 8) cell.classList.add('home-green');
        else if (row > 8 && col < 6) cell.classList.add('home-blue');
        else if (row > 8 && col > 8) cell.classList.add('home-yellow');

        if ((row === 1 || row === 3) && (col === 1 || col === 3)) cell.classList.add('token-base');
        if ((row === 1 || row === 3) && (col === 11 || col === 13)) cell.classList.add('token-base');
        if ((row === 11 || row === 13) && (col === 1 || col === 3)) cell.classList.add('token-base');
        if ((row === 11 || row === 13) && (col === 11 || col === 13)) cell.classList.add('token-base');

        else if (row === 7 && col < 6 && col !== 0) cell.classList.add('path-red');
        else if (col === 6 && row === 6) cell.classList.add('win-red');

        else if (col === 7 && row < 6 && row !== 0) cell.classList.add('path-green');
        else if (row === 6 && col === 8) cell.classList.add('win-green');

        else if (row === 7 && col > 8 && col !== 14) cell.classList.add('path-yellow');
        else if (col === 8 && row === 8) cell.classList.add('win-yellow');

        else if (col === 7 && row > 8 && row !== 14) cell.classList.add('path-blue');
        else if (row === 8 && col === 6) cell.classList.add('win-blue');

        else if (row >= 6 && row <= 8 && col >= 6 && col <= 8) {
          cell.classList.add('center');
          if (row === 7 && col === 7) cell.textContent = 'Winner'; // only center block has text
        }

        if (
          (row === 1 && col === 6) ||
          (row === 6 && col === 1) ||
          (row === 8 && col === 1) ||
          (row === 13 && col === 6) ||
          (row === 13 && col === 8) ||
          (row === 8 && col === 13) ||
          (row === 6 && col === 13) ||
          (row === 1 && col === 8)
        ) {
          cell.classList.add('star');
        }

        board.appendChild(cell);
      }
    }

    const openingSpots = {
      red: { row: 6, col: 1 },     // Red starts from left
      green: { row: 1, col: 8 },   // Green starts from top
      yellow: { row: 8, col: 13 }, // Yellow starts from right
      blue: { row: 13, col: 6 }    // Blue starts from bottom
    };

    const redTokens = [
      addToken(1, 1, 'red', 'R1'),
      addToken(1, 3, 'red', 'R2'),
      addToken(3, 1, 'red', 'R3'),
      addToken(3, 3, 'red', 'R4')
    ];
    const greenTokens = [
      addToken(1, 11, 'green', 'G1'),
      addToken(1, 13, 'green', 'G2'),
      addToken(3, 11, 'green', 'G3'),
      addToken(3, 13, 'green', 'G4')
    ];
    const yellowTokens = [
      addToken(11, 11, 'yellow', 'Y1'),
      addToken(11, 13, 'yellow', 'Y2'),
      addToken(13, 11, 'yellow', 'Y3'),
      addToken(13, 13, 'yellow', 'Y4')
    ];
    const blueTokens = [
      addToken(11, 1, 'blue', 'B1'),
      addToken(11, 3, 'blue', 'B2'),
      addToken(13, 1, 'blue', 'B3'),
      addToken(13, 3, 'blue', 'B4')
    ];

    const unlocked = {
      red: [],
      green: [],
      yellow: [],
      blue: []
    };

      const paths = {
        red: [
          { row: 6, col: 1 }, { row: 6, col: 2 }, { row: 6, col: 3 }, { row: 6, col: 4 }, { row: 6, col: 5 },
          { row: 5, col: 6 }, { row: 4, col: 6 }, { row: 3, col: 6 }, { row: 2, col: 6 }, { row: 1, col: 6 }, { row: 0, col: 6 },
          { row: 0, col: 7 }, { row: 0, col: 8 }, // added this missing step
          { row: 1, col: 8 }, { row: 2, col: 8 }, { row: 3, col: 8 }, { row: 4, col: 8 }, { row: 5, col: 8 },
          { row: 6, col: 9 }, { row: 6, col: 10 }, { row: 6, col: 11 }, { row: 6, col: 12 }, { row: 6, col: 13 },
          { row: 6, col: 14 }, { row: 7, col: 14 }, { row: 8, col: 14 }, { row: 8, col: 13 }, { row: 8, col: 12 },
          { row: 8, col: 11 }, { row: 8, col: 10 }, { row: 8, col: 9 }, { row: 9, col: 8 }, { row: 10, col: 8 },
          { row: 11, col: 8 }, { row: 12, col: 8 }, { row: 13, col: 8 }, { row: 14, col: 8 },
          { row: 14, col: 7 }, { row: 13, col: 7 }, { row: 12, col: 7 }, { row: 11, col: 7 }, { row: 10, col: 7 },
          { row: 9, col: 7 }, { row: 8, col: 7 }, { row: 8, col: 6 }, { row: 8, col: 5 }, { row: 8, col: 4 },
          { row: 8, col: 3 }, { row: 8, col: 2 }, { row: 8, col: 1 }, { row: 8, col: 0 },
          { row: 7, col: 0 }, { row: 6, col: 0 }, // fixed
          // Home stretch
          { row: 6, col: 1 }, { row: 6, col: 2 }, { row: 6, col: 3 }, { row: 6, col: 4 }, { row: 6, col: 5 }
        ],

        green: [
          { row: 1, col: 8 }, { row: 2, col: 8 }, { row: 3, col: 8 }, { row: 4, col: 8 }, { row: 5, col: 8 },
          { row: 6, col: 9 }, { row: 6, col: 10 }, { row: 6, col: 11 }, { row: 6, col: 12 }, { row: 6, col: 13 },
          { row: 6, col: 14 }, { row: 7, col: 14 }, { row: 8, col: 14 }, { row: 8, col: 13 }, { row: 8, col: 12 },
          { row: 8, col: 11 }, { row: 8, col: 10 }, { row: 8, col: 9 }, { row: 9, col: 8 }, { row: 10, col: 8 },
          { row: 11, col: 8 }, { row: 12, col: 8 }, { row: 13, col: 8 }, { row: 14, col: 8 }, { row: 14, col: 7 },
          { row: 13, col: 7 }, { row: 12, col: 7 }, { row: 11, col: 7 }, { row: 10, col: 7 }, { row: 9, col: 7 },
          { row: 8, col: 7 }, { row: 8, col: 6 }, { row: 8, col: 5 }, { row: 8, col: 4 }, { row: 8, col: 3 },
          { row: 8, col: 2 }, { row: 8, col: 1 }, { row: 8, col: 0 }, { row: 7, col: 0 }, { row: 6, col: 0 },
          { row: 6, col: 1 }, { row: 6, col: 2 }, { row: 6, col: 3 }, { row: 6, col: 4 }, { row: 6, col: 5 },
          { row: 5, col: 6 }, { row: 4, col: 6 }, { row: 3, col: 6 }, { row: 2, col: 6 }, { row: 1, col: 6 },
          { row: 0, col: 6 }, { row: 0, col: 7 }, { row: 0, col: 8 }, // added
          // Home stretch
          { row: 1, col: 7 }, { row: 2, col: 7 }, { row: 3, col: 7 }, { row: 4, col: 7 }, { row: 5, col: 7 }
        ],

        yellow: [
          { row: 8, col: 13 }, { row: 8, col: 12 }, { row: 8, col: 11 }, { row: 8, col: 10 }, { row: 8, col: 9 },
          { row: 9, col: 8 }, { row: 10, col: 8 }, { row: 11, col: 8 }, { row: 12, col: 8 }, { row: 13, col: 8 },
          { row: 14, col: 8 }, { row: 14, col: 7 }, { row: 13, col: 7 }, { row: 12, col: 7 }, { row: 11, col: 7 },
          { row: 10, col: 7 }, { row: 9, col: 7 }, { row: 8, col: 7 }, { row: 8, col: 6 }, { row: 8, col: 5 },
          { row: 8, col: 4 }, { row: 8, col: 3 }, { row: 8, col: 2 }, { row: 8, col: 1 }, { row: 8, col: 0 },
          { row: 7, col: 0 }, { row: 6, col: 0 }, { row: 6, col: 1 }, { row: 6, col: 2 }, { row: 6, col: 3 },
          { row: 6, col: 4 }, { row: 6, col: 5 }, { row: 5, col: 6 }, { row: 4, col: 6 }, { row: 3, col: 6 },
          { row: 2, col: 6 }, { row: 1, col: 6 }, { row: 0, col: 6 }, { row: 0, col: 7 }, { row: 0, col: 8 }, // added
          { row: 1, col: 8 }, { row: 2, col: 8 }, { row: 3, col: 8 }, { row: 4, col: 8 }, { row: 5, col: 8 },
          { row: 6, col: 9 }, { row: 6, col: 10 }, { row: 6, col: 11 }, { row: 6, col: 12 }, { row: 6, col: 13 },
          { row: 6, col: 14 }, { row: 7, col: 14 }, { row: 8, col: 14 },
          // Home stretch
          { row: 8, col: 13 }, { row: 8, col: 12 }, { row: 8, col: 11 }, { row: 8, col: 10 }, { row: 8, col: 9 }
        ],

        blue: [
          { row: 13, col: 6 }, { row: 12, col: 6 }, { row: 11, col: 6 }, { row: 10, col: 6 }, { row: 9, col: 6 },
          { row: 8, col: 6 }, { row: 8, col: 5 }, { row: 8, col: 4 }, { row: 8, col: 3 }, { row: 8, col: 2 },
          { row: 8, col: 1 }, { row: 8, col: 0 }, { row: 7, col: 0 }, { row: 6, col: 0 }, { row: 6, col: 1 },
          { row: 6, col: 2 }, { row: 6, col: 3 }, { row: 6, col: 4 }, { row: 6, col: 5 }, { row: 5, col: 6 },
          { row: 4, col: 6 }, { row: 3, col: 6 }, { row: 2, col: 6 }, { row: 1, col: 6 }, { row: 0, col: 6 },
          { row: 0, col: 7 }, { row: 0, col: 8 }, // added
          { row: 1, col: 8 }, { row: 2, col: 8 }, { row: 3, col: 8 }, { row: 4, col: 8 }, { row: 5, col: 8 },
          { row: 6, col: 9 }, { row: 6, col: 10 }, { row: 6, col: 11 }, { row: 6, col: 12 }, { row: 6, col: 13 },
          { row: 6, col: 14 }, { row: 7, col: 14 }, { row: 8, col: 14 }, { row: 8, col: 13 }, { row: 8, col: 12 },
          { row: 8, col: 11 }, { row: 8, col: 10 }, { row: 8, col: 9 }, { row: 9, col: 8 }, { row: 10, col: 8 },
          { row: 11, col: 8 }, { row: 12, col: 8 }, { row: 13, col: 8 }, { row: 14, col: 8 }, { row: 14, col: 7 },
          // Home stretch
          { row: 13, col: 7 }, { row: 12, col: 7 }, { row: 11, col: 7 }, { row: 10, col: 7 }, { row: 9, col: 7 }
        ]
      };



    function addToken(row, col, color, label) {
      const token = document.createElement('div');
      token.className = `token ${color}-token`;
      token.textContent = label;
      token.dataset.row = row;
      token.dataset.col = col;
      token.style.top = `${row * 40 + 8}px`;
      token.style.left = `${col * 40 + 8}px`;
      board.appendChild(token);
      return token;
    }

    function rollDice() {
      diceValue = Math.floor(Math.random() * 6) + 1;
      diceResult.textContent = `Dice: ${diceValue} (${currentPlayer})`;

      const currentTokens = {
        red: redTokens,
        green: greenTokens,
        yellow: yellowTokens,
        blue: blueTokens
      };

      if (diceValue === 6) {
        unlockFirstToken(currentTokens[currentPlayer], currentPlayer);
        // Don't change turn
      } else {
        moveUnlockedToken(currentTokens[currentPlayer], currentPlayer);
        // Change turn after move
        nextTurn();
      }
    }
    function nextTurn() {
      const currentIndex = playerOrder.indexOf(currentPlayer);
      const nextIndex = (currentIndex + 1) % playerOrder.length;
      currentPlayer = playerOrder[nextIndex];
      diceResult.textContent += ` | Next: ${currentPlayer}`;
    }

    function unlockFirstToken(tokenArray, color) {
      for (let token of tokenArray) {
        if (!unlocked[color].includes(token)) {
          const spot = openingSpots[color];
          moveTokenOut(token, spot.row, spot.col);
          unlocked[color].push(token);
          break;
        }
      }
    }

    function moveUnlockedToken(tokenArray, color) {
      const path = paths[color];
      if (unlocked[color].length > 0) {
        const token = unlocked[color][0];

        let currentRow = parseInt(token.dataset.row);
        let currentCol = parseInt(token.dataset.col);

        // Find index in path
        let currentIndex = path.findIndex(p => p.row === currentRow && p.col === currentCol);
        if (currentIndex === -1) {
          console.log(`❌ ${color.toUpperCase()} token is not on a valid path position.`);
          return;
        }
        let newIndex = currentIndex + diceValue;


        if (newIndex < path.length) {
          const newPos = path[newIndex];
          // ✅ Own home stretch check
          const isOwnHomeStretch =
            (color === 'red' && newPos.row === 6 && newPos.col >= 1 && newPos.col <= 5) ||
            (color === 'green' && newPos.col === 7 && newPos.row >= 1 && newPos.row <= 5) ||
            (color === 'yellow' && newPos.row === 8 && newPos.col >= 9 && newPos.col <= 13) ||
            (color === 'blue' && newPos.col === 7 && newPos.row >= 9 && newPos.row <= 13);


          // ✅ Center cross positions block
          const isInBlockedCrossCenter =
            (newPos.row === 6 && newPos.col === 6) ||
            (newPos.row === 6 && newPos.col === 8) ||
            (newPos.row === 8 && newPos.col === 6) ||
            (newPos.row === 8 && newPos.col === 8);


          // ✅ If trying to enter other's stretch, block
          function isInsideOtherHomeStretch(row, col, color) {
            const homeStretches = {
              red:    (r, c) => r === 6 && c >= 1 && c <= 5,
              green:  (r, c) => c === 7 && r >= 1 && r <= 5,
              yellow: (r, c) => r === 8 && c >= 9 && c <= 13,
              blue:   (r, c) => c === 7 && r >= 9 && r <= 13
            };

            return Object.entries(homeStretches).some(([clr, fn]) =>
              clr !== color && fn(row, col)
            );
          }

          function isSafeSpot(row, col) {
            return (
              (row === 1 && col === 6) ||
              (row === 6 && col === 1) ||
              (row === 8 && col === 1) ||
              (row === 13 && col === 6) ||
              (row === 13 && col === 8) ||
              (row === 8 && col === 13) ||
              (row === 6 && col === 13) ||
              (row === 1 && col === 8)
            );
          }

          if (isInBlockedCrossCenter || isInsideOtherHomeStretch(newPos.row, newPos.col, color)){
            console.log(`❌ ${color.toUpperCase()} can't enter blocked or other color's home stretch.`);
            console.log("Checking position:", newPos.row, newPos.col);
            return;
          }



          // ✅ MOVE TOKEN
          moveTokenOut(token, newPos.row, newPos.col);
          console.log(`${color.toUpperCase()} token moved to (${newPos.row}, ${newPos.col})`);

          // ✅ KILL check
          checkAndKill(newPos.row, newPos.col, color);

          // ✅ WIN check
          if (newIndex === path.length - 1) {
            console.log(`🏁 ${color.toUpperCase()} token reached final home!`);
            unlocked[color] = unlocked[color].filter(t => t !== token);
          }
        } else {
          console.log(`${color.toUpperCase()} token can't move, out of bounds`);
        }
      }
    }

    function moveTokenOut(token, row, col) {
      token.style.top = `${row * 40 + 8}px`;
      token.style.left = `${col * 40 + 8}px`;
      token.dataset.row = row;
      token.dataset.col = col;
    }

    function checkAndKill(row, col, currentColor) {
      const allColors = ['red', 'green', 'yellow', 'blue'];

      for (let color of allColors) {
        if (color === currentColor) continue;

        for (let token of unlocked[color]) {
          let tRow = parseInt(token.dataset.row);
          let tCol = parseInt(token.dataset.col);

          if (tRow === row && tCol === col) {
            console.log(`💥 ${currentColor} killed ${color} token!`);

            // Send killed token back to original locked position
            const lockedPos = getInitialLockedPosition(token.textContent);
            moveTokenOut(token, lockedPos.row, lockedPos.col);

            // Remove from unlocked list
            unlocked[color] = unlocked[color].filter(t => t !== token);
          }
        }
      }
    }

    function getInitialLockedPosition(label) {
      const map = {
        'R1': { row: 1, col: 1 }, 'R2': { row: 1, col: 3 }, 'R3': { row: 3, col: 1 }, 'R4': { row: 3, col: 3 },
        'G1': { row: 1, col: 11 }, 'G2': { row: 1, col: 13 }, 'G3': { row: 3, col: 11 }, 'G4': { row: 3, col: 13 },
        'Y1': { row: 11, col: 11 }, 'Y2': { row: 11, col: 13 }, 'Y3': { row: 13, col: 11 }, 'Y4': { row: 13, col: 13 },
        'B1': { row: 11, col: 1 }, 'B2': { row: 11, col: 3 }, 'B3': { row: 13, col: 1 }, 'B4': { row: 13, col: 3 }
      };
      return map[label];
    }

  </script>
</body>
</html>
