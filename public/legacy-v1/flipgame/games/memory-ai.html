<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    if (typeof gameMode === 'undefined') {
      var gameMode = 'Computer';
    }
    let currentPlayer = 1;
    let flippedCards = [];
    let matchedPairs = 0;
    let player1Score = 0;
    let player2Score = 0;
    let computerMemory = {};

    document.addEventListener("DOMContentLoaded", () => {
      startGame();
    });

    function startGame() {
      const gameBoard = document.getElementById('gameBoard');
      const icons = ['🍎','🍌','🍇','🍓','🍒','🍍','🍎','🍌','🍇','🍓','🍒','🍍']; // 6 pairs x 2
      shuffle(icons);
      gameBoard.innerHTML = '';

      icons.forEach((icon, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.icon = icon;
        card.dataset.index = index;
        card.addEventListener('click', handleCardClick);
        gameBoard.appendChild(card);
      });

      gameBoard.style.display = 'grid';
      document.getElementById('scoreboard').style.display = 'flex';

      updateScores();
      updateTurn();
      if (currentPlayer === 2) setTimeout(computerTurn, 800);
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function handleCardClick(event) {
      if (currentPlayer !== 1) return; // prevent player click during computer turn

      const card = event.target;
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

      flipCard(card);
    }

    function flipCard(card) {
      card.classList.add('flipped');
      card.textContent = card.dataset.icon;
      flippedCards.push(card);

      if (currentPlayer === 2) {
        const icon = card.dataset.icon;
        const index = card.dataset.index;
        if (!computerMemory[icon]) computerMemory[icon] = [];
        if (!computerMemory[icon].includes(index)) {
          computerMemory[icon].push(index);
        }
      }

      if (flippedCards.length === 2) {
        const [card1, card2] = flippedCards;

        if (card1.dataset.icon === card2.dataset.icon) {
          card1.classList.add('matched');
          card2.classList.add('matched');
          matchedPairs++;

          if (currentPlayer === 1) player1Score++;
          else player2Score++;

          updateScores();

          flippedCards = [];

          if (matchedPairs === 6) {
            const winner = player1Score > player2Score ? "You" : "Computer";
            alert(`${winner} win!`);
            return;
          }

          if (gameMode === 'Computer' && currentPlayer === 2) {
            currentPlayer = 1;
            updateTurn();
          }
        } else {
          setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            card1.textContent = '';
            card2.textContent = '';
            flippedCards = [];

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateTurn();

            if (currentPlayer === 2) {
              setTimeout(computerTurn, 800);
            }
          }, 1000);
        }
      }
    }

    function computerTurn() {
      const unflipped = Array.from(document.querySelectorAll('.card:not(.flipped):not(.matched)'));
      if (unflipped.length < 2) return;

      // Try known match
      for (let icon in computerMemory) {
        const positions = computerMemory[icon];
        if (positions.length >= 2) {
          const card1 = document.querySelector(`.card[data-index="${positions[0]}"]`);
          const card2 = document.querySelector(`.card[data-index="${positions[1]}"]`);
          if (card1 && card2 && !card1.classList.contains('matched') && !card2.classList.contains('matched')) {
            card1.click();
            setTimeout(() => card2.click(), 600);
            return;
          }
        }
      }

      // Random guess
      const card1 = unflipped[Math.floor(Math.random() * unflipped.length)];
      const remaining = unflipped.filter(c => c !== card1);
      const card2 = remaining[Math.floor(Math.random() * remaining.length)];
      card1.click();
      setTimeout(() => card2.click(), 600);
    }

    function updateScores() {
      document.getElementById('player1Score').textContent = `You: ${player1Score}`;
      document.getElementById('player2Score').textContent = `Computer: ${player2Score}`;
    }

    function updateTurn() {
      const board = document.getElementById('gameBoard');
      board.style.pointerEvents = currentPlayer === 1 ? 'auto' : 'none';
    }

  </script>
</body>
</html>
