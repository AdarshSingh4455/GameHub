<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPS - Mobile Battle</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      overflow: hidden;
    }
    .half {
      position: absolute;
      width: 100%;
      height: 40%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      clip-path: ellipse(80% 100% at 50% 130%);
    }
    .top {
      top: 0;
      background: radial-gradient(circle at center, #0066ff 50%, #54a3db);
      transform: rotate(180deg);
    }
    .bottom {
      bottom: 0;
      background: radial-gradient(circle at center, #ff0033 50%, #cd5b5b);
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 15px;
    }
    .buttons button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: #000;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      transition: 0.2s;
    }
    .buttons button:hover {
      transform: scale(1.1);
      background: #f0f0f0;
    }
    #timer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 84px;
      font-weight: bold;
      color: gold;
      z-index: 10;
    }
    #result {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 12px;
      display: none;
      z-index: 20;
    }
    .side-score {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #fff;
      border-radius: 50% 50% 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      z-index: 15;
    }
    .blue-score {
      top: 41%;
      left: 10px;
      color: #0066ff;
    }
    .red-score {
      top: 50%;
      left: 10px;
      transform: rotate(180deg);
      color: #ff0033;
    }
    .start-overlay, .end-overlay {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      flex-direction: column;
    }
    .start-overlay button,
    .end-overlay button {
      padding: 20px 40px;
      font-size: 24px;
      border: none;
      border-radius: 15px;
      margin: 10px;
      cursor: pointer;
      background: #00ffcc;
      color: #000;
    }
    .popup-result {
      font-size: 28px;
      font-weight: bold;
      color: white;
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  
  <div class="start-overlay" id="startOverlay">
    <button onclick="startToss()">Start Game</button>
  </div>

  <div class="end-overlay" id="endOverlay" style="display: none;">
    <div class="popup-result" id="finalResult"></div>
    <button onclick="restartGame()">Restart</button>
    <button onclick="window.location.href='index.html'">Quit</button>
  </div>

  <div id="timer"></div>
  <div id="result"></div>
  <div class="score-board" id="scoreBoard">Score: 0 | Round: 1 / 3</div>

  <div class="game-area" id="gameArea" style="display:none;">
    <div class="half top">
      <div class="buttons" id="blue-options"></div>
    </div>
    <div class="half bottom">
      <div class="buttons" id="red-options"></div>
    </div>
  </div>

  <script>
    let timer = 3;
    let round = 1;
    let score = 0;
    let batter = '';
    let isToss = true;

  function startToss() {
    document.getElementById("startOverlay").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerText = "TOSS: Both players choose a number (1-6)";
    generateNumberButtons();
  }

  function generateNumberButtons() {
    const optionsBlue = document.getElementById("blue-options");
    const optionsRed = document.getElementById("red-options");
    optionsBlue.innerHTML = "";
    optionsRed.innerHTML = "";

    for (let i = 1; i <= 6; i++) {
      let btn1 = document.createElement("button");
      let btn2 = document.createElement("button");
      btn1.innerText = i;
      btn2.innerText = i;
      btn1.onclick = () => playerChoose('blue', i);
      btn2.onclick = () => playerChoose('red', i);
      optionsBlue.appendChild(btn1);
      optionsRed.appendChild(btn2);
    }
  }

  let blueChoice = null;
  let redChoice = null;

  function playerChoose(player, number) {
    if (player === 'blue') blueChoice = number;
    else redChoice = number;

    if (blueChoice !== null && redChoice !== null) {
      if (isToss) {
        tossResult();
      } else {
        evaluateBatting();
      }
    }
  }

  function tossResult() {
    batter = Math.random() < 0.5 ? 'blue' : 'red';
    document.getElementById("result").innerText = `${batter.toUpperCase()} won the toss and will bat for 3 rounds!`;
    blueChoice = null;
    redChoice = null;
    isToss = false;
    setTimeout(() => {
      document.getElementById("result").innerText = `Round ${round} - Batter choose your number (1-6)`;
    }, 2000);
  }

  function evaluateBatting() {
    const batterChoice = batter === 'blue' ? blueChoice : redChoice;
    const bowlerChoice = batter === 'blue' ? redChoice : blueChoice;

    if (batterChoice === bowlerChoice) {
      document.getElementById("result").innerText = `Out! Both chose ${batterChoice}`;
    } else {
      score += batterChoice;
      document.getElementById("result").innerText = `Runs Scored: ${batterChoice} (Bowler chose ${bowlerChoice})`;
    }

    round++;
    updateScoreUI();
    blueChoice = null;
    redChoice = null;

    if (round > 3) {
      setTimeout(() => endGame(), 1500);
    } else {
      setTimeout(() => {
        document.getElementById("result").innerText = `Round ${round} - Batter choose your number (1-6)`;
      }, 1500);
    }
  }

  function updateScoreUI() {
    document.getElementById("scoreBoard").innerText = `Score: ${score} | Round: ${round <= 3 ? round : 3} / 3`;
  }

  function endGame() {
    document.getElementById("gameArea").style.display = "none";
    document.getElementById("finalResult").innerText = `${batter.toUpperCase()} scored ${score} runs!`;
    document.getElementById("endOverlay").style.display = "flex";
  }

  function restartGame() {
    round = 1;
    score = 0;
    batter = '';
    isToss = true;
    blueChoice = null;
    redChoice = null;
    document.getElementById("endOverlay").style.display = "none";
    document.getElementById("result").innerText = "TOSS: Both players choose a number (1-6)";
    document.getElementById("gameArea").style.display = "block";
    updateScoreUI();
    generateNumberButtons();
  }
  </script>
</body>
</html>
