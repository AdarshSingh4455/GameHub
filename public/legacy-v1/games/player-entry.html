<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player Setup</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 1rem;
    }

    input, select {
      padding: 0.5rem;
      margin: 0.5rem;
      border-radius: 5px;
      border: none;
      font-size: 1rem;
    }

    button {
      padding: 0.5rem 1.5rem;
      margin-top: 1.5rem;
      background-color: #4caf50;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff5722;
    }

    
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: #4caf50;
      color: white;
      padding: 10px 15px;
      border: none;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s;
    }

    .back-button:hover {
      background-color: #ff5722;
    }

  </style>
</head>
<body>
  <h1>🎮 Enter Player Info</h1>
  <button onclick="goBack()" class="back-button">⬅ Back</button>

  <input type="text" id="player1" placeholder="Player X Name" />
  <select id="icon1">
    <option value="😎">😎</option>
    <option value="👨‍💻">👨‍💻</option>
    <option value="🧑">🧑</option>
    <option value="👩‍🚀">👩‍🚀</option>
  </select>

  <input type="text" id="player2" placeholder="Player O Name" />
  <select id="icon2">
    <option value="🤖">🤖</option>
    <option value="👽">👽</option>
    <option value="🧙‍♂️">🧙‍♂️</option>
    <option value="🧛">🧛</option>
  </select>

  <button onclick="startGame()">🚀 Start Game</button>

  <script>
    function startGame() {
      const player1 = document.getElementById("player1").value || "Player X";
      const player2 = document.getElementById("player2").value || "Player O";
      const icon1 = document.getElementById("icon1").value;
      const icon2 = document.getElementById("icon2").value;

      localStorage.setItem("player1Name", player1);
      localStorage.setItem("player2Name", player2);
      localStorage.setItem("player1Icon", icon1);
      localStorage.setItem("player2Icon", icon2);

      window.open("scribble.html", "_blank");
    }
    function goBack() {
      // window.history.back();
      window.location.href = "/gameHub/index.html";  // previous page
    }
  </script>
</body>
</html>
