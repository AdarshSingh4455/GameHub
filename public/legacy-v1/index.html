<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Adi's GameHub - Play exciting games like Rock Paper Scissors, Scribble, Odd-Even Duel, and more!" />
  <title>GameHub | By Adi</title>
  <link rel="icon" href="https://img.icons8.com/ios-filled/50/rock.png" type="image/x-icon" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #ffffff;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    header {
      padding: 1rem;
      text-align: center;
      background-color: #1f1f1f;
      box-shadow: 0 2px 5px rgba(255, 255, 255, 0.1);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      padding: 2rem;
    }

    .card {
      background-color: #1e1e1e;
      padding: 1.5rem;
      border-radius: 16px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px) rotate(2deg); /* Tilt effect */
      box-shadow: 0 0 15px #03dac5;
      background-color: #2a2a2a;
    }

    .card img {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .card p {
      margin: 0;
      font-size: 1.2rem;
      transition: color 0.3s ease;
    }

    .card:hover p {
      color: #03dac5;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #aaa;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }

    footer:hover {
      color: #ffffff;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card img {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>WeR</h1>
  </header>

  <main>
    <div class="grid">
      <!-- Static Games -->
      <div class="card" onclick="openGame('./games/rps.html')" tabindex="0" aria-label="Play Rock Paper Scissors">
        <img src="https://img.icons8.com/ios-filled/100/rock.png" alt="RPS" />
        <p>Rock Paper Scissors</p>
      </div>

      <div class="card" onclick="openGame('./games/Cricket/main.html')" tabindex="0" aria-label="Play Odd Even Duel">
        <img src="https://img.icons8.com/ios-filled/100/cricket.png" alt="Cricket" />
        <p>Cricket</p>
      </div>
      
      <div class="card" onclick="openGame('./games/2048.html')" tabindex="0" aria-label="Play 2048">
        <img src="https://img.icons8.com/ios-filled/100/grid-2.png" alt="2048" />
        <p>2048</p>
      </div>

      <div class="card" onclick="openGame('./games/fighter.html')" tabindex="0" aria-label="Play Fighter Jet">
        <img src="https://img.icons8.com/ios-filled/100/fighter-jet" alt="Fighter Jet" />
        <p>Fighter Jet</p>
      </div>

      <div class="card" onclick="openGame('./numberguess/mode.html','_blank')" tabindex="0" aria-label="Play Number guessing">
        <img src="https://img.icons8.com/?size=100&id=7855&format=png&color=000000" alt="Number Guessing Game Icon" />
        <p>Number Guessing</p>
      </div>

      <div class="card" onclick="openGame('./games/player-entry.html','_blank')" tabindex="0" aria-label="Play Scribble Multiplayer">
        <img src="https://img.icons8.com/ios-filled/100/tic-tac-toe.png" alt="Tic-Tac-Toe" />
        <p>Tic-Tac-Toe</p>
      </div>
      
      <div class="card" onclick="openGame('./flipgame/MEMORY/index.html','_blank')" tabindex="0" aria-label="Play Memory Card Flip">
        <img src="https://img.icons8.com/ios-filled/100/brain.png" alt="Memory" />
        <p>Memory Card Flip</p>
      </div>

      <!-- Multiplayer Game -->
      <div class="card" onclick="openGame('./games/player-entry.html','_blank')" tabindex="0" aria-label="Play Scribble Multiplayer">
        <img src="https://img.icons8.com/ios-filled/100/collaboration.png" alt="Skribble Multiplayer" />
        <p>Scribble Multiplayer</p>
      </div>

      <!-- New Game: Who's Spy -->
      <div class="card" onclick="openGame('./games/whosspy.html')" tabindex="0" aria-label="Play Who's Spy">
        <img src="https://img.icons8.com/ios-filled/100/detective.png" alt="Who's Spy" />
        <p>Who's Spy</p>
      </div>
      
      <div class="card" onclick="openGame('./games/archery.html')" tabindex="0" aria-label="Play Archery">
        <img src="https://img.icons8.com/ios-filled/100/archer" alt="Archery" />
        <p>Archery</p>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Adi's GameHub. All rights reserved.
  </footer>

  <script>
    function openGame(url) {
      const newTab = window.open(url, '_blank');
      if (!newTab) {
        alert('Unable to open the game. Please check your browser settings.');
      }
    }
  </script>

</body>
</html>
